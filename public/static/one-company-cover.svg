<svg width="1280" height="800" viewBox="0 0 1280 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="800" rx="36" fill="#080A12"/>
  <rect x="24" y="24" width="1232" height="752" rx="28" fill="url(#bg)"/>
  <circle cx="1030" cy="156" r="220" fill="url(#glow1)" fill-opacity="0.65"/>
  <circle cx="238" cy="668" r="260" fill="url(#glow2)" fill-opacity="0.42"/>
  <circle cx="676" cy="402" r="320" fill="url(#glow3)" fill-opacity="0.28"/>
  <rect x="86" y="96" width="220" height="42" rx="21" fill="rgba(255,255,255,0.10)"/>
  <text x="112" y="123" fill="#DDE7FF" font-size="20" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" letter-spacing="1.2">SOLO COMPANY</text>
  <text x="86" y="248" fill="#FFFFFF" font-size="78" font-weight="700" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">一人公司出海</text>
  <text x="86" y="316" fill="#B7C3E0" font-size="28" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">从公司主体、EIN、银行、Stripe 到 Wise 与税务</text>
  <text x="86" y="360" fill="#8FA0C8" font-size="24" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">给想做海外产品的一人公司新手，一条更稳的起步路线。</text>

  <rect x="86" y="452" width="176" height="52" rx="18" fill="rgba(255,255,255,0.11)" stroke="rgba(255,255,255,0.14)"/>
  <text x="120" y="486" fill="#FFFFFF" font-size="24" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">公司注册</text>
  <rect x="280" y="452" width="112" height="52" rx="18" fill="rgba(255,255,255,0.11)" stroke="rgba(255,255,255,0.14)"/>
  <text x="318" y="486" fill="#FFFFFF" font-size="24" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">EIN</text>
  <rect x="410" y="452" width="130" height="52" rx="18" fill="rgba(255,255,255,0.11)" stroke="rgba(255,255,255,0.14)"/>
  <text x="444" y="486" fill="#FFFFFF" font-size="24" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">Stripe</text>
  <rect x="558" y="452" width="114" height="52" rx="18" fill="rgba(255,255,255,0.11)" stroke="rgba(255,255,255,0.14)"/>
  <text x="595" y="486" fill="#FFFFFF" font-size="24" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">Wise</text>
  <rect x="690" y="452" width="114" height="52" rx="18" fill="rgba(255,255,255,0.11)" stroke="rgba(255,255,255,0.14)"/>
  <text x="727" y="486" fill="#FFFFFF" font-size="24" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">税务</text>

  <rect x="842" y="124" width="316" height="468" rx="28" fill="rgba(8,10,18,0.48)" stroke="rgba(255,255,255,0.14)"/>
  <text x="886" y="194" fill="#D8E2FF" font-size="24" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">推荐顺序</text>
  <text x="886" y="248" fill="#FFFFFF" font-size="34" font-weight="700" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">1. 注册主体</text>
  <text x="886" y="304" fill="#FFFFFF" font-size="34" font-weight="700" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">2. 申请 EIN</text>
  <text x="886" y="360" fill="#FFFFFF" font-size="34" font-weight="700" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">3. 开银行</text>
  <text x="886" y="416" fill="#FFFFFF" font-size="34" font-weight="700" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">4. 接 Stripe</text>
  <text x="886" y="472" fill="#FFFFFF" font-size="34" font-weight="700" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">5. 做税务归档</text>
  <text x="886" y="546" fill="#95A7D5" font-size="22" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">先跑通闭环，再扩张。</text>
  <text x="886" y="582" fill="#95A7D5" font-size="22" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">先合法收款，再谈规模化。</text>

  <defs>
    <linearGradient id="bg" x1="58" y1="42" x2="1176" y2="784" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F1321"/>
      <stop offset="0.5" stop-color="#10172B"/>
      <stop offset="1" stop-color="#131A33"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1030 156) rotate(90) scale(220)">
      <stop stop-color="#4FD1FF"/>
      <stop offset="1" stop-color="#4FD1FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(238 668) rotate(90) scale(260)">
      <stop stop-color="#A855F7"/>
      <stop offset="1" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(676 402) rotate(90) scale(320)">
      <stop stop-color="#22C55E"/>
      <stop offset="1" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
