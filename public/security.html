<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0a0a0d" />
  <title>安全控制台 · Prompt Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0d;
      --panel: #131318;
      --panel-2: #1a1a22;
      --border: #2a2a35;
      --text: #f3f3f7;
      --text-dim: #9a9aa8;
      --accent: #6366f1;
      --pink: #f472b6;
      --green: #34d399;
      --red: #f87171;
      --amber: #fbbf24;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: var(--bg); color: var(--text); }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    header.topbar {
      position: sticky; top: 0; z-index: 30;
      background: rgba(10,10,13,.85);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
    }
    .topbar-inner {
      display: flex; align-items: center; gap: 16px;
      max-width: 1400px; margin: 0 auto;
    }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; }
    .brand .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--pink));
    }
    .topbar-right { margin-left: auto; display: flex; gap: 8px; }
    .link {
      padding: 7px 12px; border-radius: 8px; color: var(--text-dim);
      border: 1px solid var(--border); text-decoration: none; font-size: 13px;
    }
    .link:hover { color: var(--text); background: rgba(255,255,255,.05); }
    main { max-width: 1400px; margin: 0 auto; padding: 28px; }
    h1 { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
    .sub { color: var(--text-dim); font-size: 13px; margin-bottom: 24px; }
    .grid {
      display: grid; gap: 16px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      margin-bottom: 24px;
    }
    .card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px;
    }
    .card .lbl { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
    .card .val { font-size: 28px; font-weight: 800; }
    .card.warn { border-color: rgba(251,191,36,.4); background: rgba(251,191,36,.06); }
    .card.danger { border-color: rgba(248,113,113,.4); background: rgba(248,113,113,.06); }
    .card.ok { border-color: rgba(52,211,153,.4); background: rgba(52,211,153,.06); }
    section { margin-bottom: 28px; }
    section h2 { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
    table { width: 100%; border-collapse: collapse; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    th, td { padding: 10px 14px; text-align: left; font-size: 13px; }
    th { background: var(--panel-2); color: var(--text-dim); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; }
    tr + tr td { border-top: 1px solid var(--border); }
    tr:hover td { background: rgba(255,255,255,.02); }
    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 12px; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; background: var(--panel-2); border: 1px solid var(--border); color: var(--text-dim); }
    .pill.warn { background: rgba(251,191,36,.15); border-color: rgba(251,191,36,.4); color: #fde68a; }
    .pill.danger { background: rgba(248,113,113,.15); border-color: rgba(248,113,113,.4); color: #fecaca; }
    .pill.ok { background: rgba(52,211,153,.15); border-color: rgba(52,211,153,.4); color: #a7f3d0; }
    .btn {
      padding: 6px 12px; font-size: 12px;
      background: transparent; border: 1px solid var(--border);
      color: var(--text-dim); border-radius: 6px; cursor: pointer;
    }
    .btn:hover { color: var(--text); border-color: #3a3a44; }
    .btn.danger { color: #fca5a5; border-color: rgba(248,113,113,.3); }
    .btn.danger:hover { background: rgba(248,113,113,.1); }
    .toolbar { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
    .toolbar input {
      padding: 8px 12px; background: var(--panel); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 13px; min-width: 200px;
    }
    .toolbar button { padding: 8px 14px; }
    .empty { padding: 20px; color: var(--text-dim); text-align: center; font-size: 13px; }
    .cell-stack { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .cell-sub { color: var(--text-dim); font-size: 11px; }
    .reason-text { max-width: 320px; white-space: pre-wrap; word-break: break-word; }
    .actions-row { display: flex; gap: 8px; flex-wrap: wrap; }
    /* Tabs */
    .tabs {
      display: flex; gap: 4px; border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .tab {
      padding: 10px 18px; font-size: 14px; font-weight: 600;
      background: transparent; border: 0; border-bottom: 2px solid transparent;
      color: var(--text-dim); cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--text); border-bottom-color: var(--accent); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Forms */
    .form-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px; margin-bottom: 16px;
    }
    .form-field { display: flex; flex-direction: column; gap: 6px; }
    .form-field label {
      font-size: 11px; color: var(--text-dim); text-transform: uppercase;
      letter-spacing: .06em; font-weight: 600;
    }
    .form-field input, .form-field select, .form-field textarea {
      padding: 9px 12px; background: var(--panel-2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 13px;
      font-family: inherit;
    }
    .form-field input:focus, .form-field select:focus, .form-field textarea:focus {
      outline: none; border-color: var(--accent);
    }
    .form-field textarea { resize: vertical; min-height: 80px; }
    .form-actions { display: flex; gap: 8px; align-items: center; }
    .btn-primary {
      padding: 9px 18px; font-size: 13px; font-weight: 600;
      background: var(--accent); color: white; border: 0;
      border-radius: 8px; cursor: pointer;
    }
    .btn-primary:hover { background: #4f46e5; }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-ghost {
      padding: 9px 18px; font-size: 13px;
      background: transparent; border: 1px solid var(--border);
      color: var(--text-dim); border-radius: 8px; cursor: pointer;
    }
    .btn-ghost:hover { color: var(--text); border-color: #3a3a44; }

    /* Code generation result panel */
    .code-result {
      background: var(--panel-2); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px;
      margin-top: 16px;
    }
    .code-result-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px; gap: 12px;
    }
    .code-result-header h3 { font-size: 14px; font-weight: 700; }
    .code-result-actions { display: flex; gap: 6px; }
    .code-list {
      max-height: 360px; overflow: auto;
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    }
    .code-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 12px; border-bottom: 1px solid var(--border);
    }
    .code-row:last-child { border-bottom: 0; }
    .code-row .code-num { color: var(--text-faint); width: 30px; }
    .code-row .code-text { color: var(--accent); flex: 1; word-break: break-all; user-select: all; }
    .code-row .code-copy {
      padding: 3px 8px; font-size: 11px; background: transparent;
      border: 1px solid var(--border); color: var(--text-dim);
      border-radius: 4px; cursor: pointer;
    }
    .code-row .code-copy:hover { color: var(--text); border-color: var(--accent); }

    /* Announcement cards in admin list */
    .ann-admin-card {
      background: var(--panel-2); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px; margin-bottom: 10px;
    }
    .ann-admin-card.inactive { opacity: .55; }
    .ann-admin-card .ann-head {
      display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .ann-admin-card .ann-head h3 { font-size: 14px; font-weight: 700; flex: 1; min-width: 0; }
    .ann-admin-card .ann-body-text {
      color: var(--text-dim); font-size: 13px; line-height: 1.6;
      white-space: pre-wrap; word-break: break-word; margin-bottom: 8px;
    }
    .ann-admin-card .ann-meta-row {
      display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
      font-size: 11px; color: var(--text-faint);
    }
    .ann-admin-card .ann-actions {
      display: flex; gap: 6px; margin-left: auto;
    }

    .toast {
      position: fixed; bottom: 24px; right: 24px;
      padding: 12px 18px; background: var(--panel); border: 1px solid var(--border);
      border-radius: 10px; font-size: 13px; z-index: 100;
      box-shadow: 0 8px 24px rgba(0,0,0,.3);
      animation: toast-in .2s ease-out;
    }
    .toast.ok { border-color: var(--green); color: var(--green); }
    .toast.err { border-color: var(--red); color: var(--red); }
    @keyframes toast-in {
      from { transform: translateY(8px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <span class="dot"></span>
      安全控制台 <small style="color:var(--text-dim);font-weight:400;margin-left:6px;">· Security Console</small>
    </div>
    <div class="topbar-right">
      <a class="link" href="/app">提示词库</a>
      <a class="link" href="/me">个人中心</a>
      <a class="link" href="/api/admin/security/overview" target="_blank">原始 JSON</a>
    </div>
  </div>
</header>

<main>
  <h1>管理员控制台</h1>
  <div class="sub">仅 ADMIN_USER_IDS 中的账号可访问</div>

  <div class="tabs" role="tablist">
    <button class="tab active" data-tab="security" type="button">安全监控</button>
    <button class="tab" data-tab="invites" type="button">邀请码</button>
    <button class="tab" data-tab="announcements" type="button">公告</button>
  </div>

  <div class="tab-panel active" id="panel-security">
    <h1 style="font-size:20px;margin-bottom:4px;">过去 24 小时</h1>
    <div class="sub" id="updated">载入中…</div>

    <div class="grid">
      <div class="card"><div class="lbl">总请求</div><div class="val" id="kRequests">-</div></div>
      <div class="card"><div class="lbl">安全事件</div><div class="val" id="kEvents">-</div></div>
      <div class="card warn"><div class="lbl">登录失败</div><div class="val" id="kLoginFail">-</div></div>
      <div class="card danger"><div class="lbl">高风险拦截</div><div class="val" id="kHighRisk">-</div></div>
      <div class="card warn"><div class="lbl">自动封禁候选</div><div class="val" id="kAutoBan">-</div></div>
      <div class="card"><div class="lbl">封禁 IP</div><div class="val" id="kIpBlock">-</div></div>
      <div class="card ok"><div class="lbl">活跃会话</div><div class="val" id="kSessions">-</div></div>
    </div>

    <section>
      <h2>排行榜 - 最活跃用户</h2>
      <div id="topUsersWrap"></div>
    </section>

    <section>
      <h2>排行榜 - 最频繁 IP</h2>
      <div id="topIpsWrap"></div>
    </section>

    <section>
      <h2>封禁 IP</h2>
      <div class="toolbar">
        <input id="blockIp" placeholder="输入 IP 手动封禁" />
        <input id="blockReason" placeholder="原因 (可选)" />
        <button class="btn danger" id="blockBtn">封禁</button>
      </div>
      <div id="blockedWrap"></div>
    </section>

    <section>
      <h2>账号管理</h2>
      <div id="accountsWrap"></div>
    </section>

    <section>
      <h2>最近安全事件</h2>
      <div id="eventsWrap"></div>
    </section>
  </div>

  <!-- Tab 2: 邀请码 -->
  <div class="tab-panel" id="panel-invites">
    <h1 style="font-size:20px;margin-bottom:4px;">生成邀请码</h1>
    <div class="sub">支持单条和批量生成。批量最多 200 个。明文只显示一次，请妥善保存。</div>

    <div class="form-grid">
      <div class="form-field">
        <label for="invCount">生成数量</label>
        <input id="invCount" type="number" min="1" max="200" value="1" />
      </div>
      <div class="form-field">
        <label for="invLabel">标签 (买家/订单备注)</label>
        <input id="invLabel" type="text" placeholder="例如: 闲鱼用户 A" />
      </div>
      <div class="form-field">
        <label for="invNote">备注</label>
        <input id="invNote" type="text" placeholder="例如: 订单 #20260713-A1" />
      </div>
      <div class="form-field">
        <label for="invYears">会员年限</label>
        <input id="invYears" type="number" min="1" max="100" value="10" />
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-primary" id="invGenerateBtn" type="button">生成</button>
      <button class="btn-ghost" id="invResetBtn" type="button">重置</button>
      <span class="sub" id="invHint" style="margin:0;font-size:12px;color:var(--text-faint);"></span>
    </div>

    <div id="invResult"></div>
  </div>

  <!-- Tab 3: 公告 -->
  <div class="tab-panel" id="panel-announcements">
    <h1 style="font-size:20px;margin-bottom:4px;">发布公告</h1>
    <div class="sub">所有登录用户都会看到。可设置置顶、过期时间、随时停用。</div>

    <div class="form-grid">
      <div class="form-field">
        <label for="annKind">类型</label>
        <select id="annKind">
          <option value="info">通知 (蓝)</option>
          <option value="warn">警告 (黄)</option>
          <option value="downtime">停服/维护 (红)</option>
          <option value="promo">活动/促销 (紫)</option>
        </select>
      </div>
      <div class="form-field">
        <label for="annTitle">标题</label>
        <input id="annTitle" type="text" placeholder="例如: 今晚 23:00 停服更新" maxlength="200" />
      </div>
      <div class="form-field" style="grid-column:1/-1;">
        <label for="annBody">正文</label>
        <textarea id="annBody" placeholder="公告详细内容..." maxlength="5000"></textarea>
      </div>
      <div class="form-field">
        <label for="annExpires">过期时间 (可选)</label>
        <input id="annExpires" type="datetime-local" />
      </div>
      <div class="form-field">
        <label for="annPinned">置顶显示</label>
        <input id="annPinned" type="checkbox" />
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-primary" id="annPublishBtn" type="button">发布</button>
      <button class="btn-ghost" id="annResetBtn" type="button">清空</button>
    </div>

    <section style="margin-top:32px;">
      <h2>已有公告 <span style="font-weight:400;color:var(--text-dim);font-size:12px;">(含已停用和已过期)</span></h2>
      <div id="annList"></div>
    </section>
  </div>
</main>

<script>
  function $(s) { return document.querySelector(s); }
  function el(tag, attrs, ...kids) {
    const n = document.createElement(tag);
    if (attrs) for (const k in attrs) {
      if (k === 'class') n.className = attrs[k];
      else if (k === 'html') n.innerHTML = attrs[k];
      else n.setAttribute(k, attrs[k]);
    }
    for (const k of kids) if (k != null) n.appendChild(typeof k === 'string' ? document.createTextNode(k) : k);
    return n;
  }
  function fmtTs(ts) { return new Date(ts).toLocaleString('zh-CN', { hour12: false }); }
  function fmtMaybeTs(ts) { return ts ? fmtTs(ts) : '-'; }
  function escapeHtml(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function showToast(msg, kind) {
    const t = document.createElement('div');
    t.className = 'toast ' + (kind || '');
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 200); }, 2500);
  }// ---- Tabs ----
  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      const name = btn.dataset.tab;
      document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b === btn));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + name));
      if (name === 'invites') {/* nothing to lazy-load */}
      if (name === 'announcements') loadAnnouncementsList();
    });
  });

  // ---- Tab 1: 安全监控 ----
  async function loadSecurity() {
    const r = await fetch('/api/admin/security/overview', { credentials: 'same-origin' });
    if (r.status === 401) { location.href = '/login'; return; }
    if (!r.ok) { $('#updated').textContent = '加载失败 ' + r.status; return; }
    const j = await r.json();
    const c = j.counts || {};
    $('#kRequests').textContent = c.total_requests ?? '-';
    $('#kEvents').textContent = c.security_events ?? '-';
    $('#kLoginFail').textContent = c.login_failed ?? '-';
    $('#kHighRisk').textContent = c.login_high_risk ?? '-';
    $('#kAutoBan').textContent = c.auto_ban ?? '-';
    $('#kIpBlock').textContent = c.blocked_ips ?? '-';
    $('#kSessions').textContent = c.active_sessions ?? '-';
    $('#updated').textContent = '更新于 ' + fmtTs(Date.now()) + ' - 窗口 ' + j.window;
    renderTopUsers(j.top_users || []);
    renderTopIps(j.top_ips || []);
    renderBlocked(j.blocked_ips || []);
    renderAccounts(j.accounts || []);
    renderEvents(j.recent_events || []);
  }

  function renderTopUsers(rows) {
    const wrap = $('#topUsersWrap');
    if (!rows.length) { wrap.innerHTML = '<div class="empty">暂无数据</div>'; return; }
    const t = el('table');
    t.innerHTML = '<thead><tr><th>用户</th><th>请求数</th></tr></thead>';
    const tb = el('tbody');
    for (const r of rows) {
      const tr = el('tr');
      const cell = el('div', { class: 'cell-stack' });
      cell.appendChild(el('span', null, r.username || '匿名/未知'));
      cell.appendChild(el('span', { class: 'mono cell-sub' }, r.user_id || '-'));
      tr.appendChild(el('td', null, cell));
      tr.appendChild(el('td', null, String(r.hits)));
      tb.appendChild(tr);
    }
    t.appendChild(tb);
    wrap.innerHTML = ''; wrap.appendChild(t);
  }

  function renderTopIps(rows) {
    const wrap = $('#topIpsWrap');
    if (!rows.length) { wrap.innerHTML = '<div class="empty">暂无数据</div>'; return; }
    const t = el('table');
    t.innerHTML = '<thead><tr><th>IP</th><th>请求数</th><th></th></tr></thead>';
    const tb = el('tbody');
    for (const r of rows) {
      const tr = el('tr');
      tr.appendChild(el('td', null, el('span', { class: 'mono' }, r.ip)));
      tr.appendChild(el('td', null, String(r.hits)));
      const btn = el('button', { class: 'btn danger' }, '封禁');
      btn.onclick = () => doBlock(r.ip, 'top_ip');
      tr.appendChild(el('td', null, btn));
      tb.appendChild(tr);
    }
    t.appendChild(tb);
    wrap.innerHTML = ''; wrap.appendChild(t);
  }

  function renderBlocked(rows) {
    const wrap = $('#blockedWrap');
    if (!rows.length) { wrap.innerHTML = '<div class="empty">当前无封禁 IP</div>'; return; }
    const t = el('table');
    t.innerHTML = '<thead><tr><th>IP</th><th>原因</th><th>到期</th><th></th></tr></thead>';
    const tb = el('tbody');
    for (const r of rows) {
      const tr = el('tr');
      tr.appendChild(el('td', null, el('span', { class: 'mono' }, r.ip)));
      tr.appendChild(el('td', null, r.reason || '-'));
      tr.appendChild(el('td', null, r.expires_at ? fmtTs(r.expires_at) : '永久'));
      const btn = el('button', { class: 'btn' }, '解除');
      btn.onclick = async () => {
        await fetch('/api/admin/security/unblock-ip', {
          method: 'POST', credentials: 'same-origin',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ ip: r.ip }),
        });
        loadSecurity();
      };
      tr.appendChild(el('td', null, btn));
      tb.appendChild(tr);
    }
    t.appendChild(tb);
    wrap.innerHTML = ''; wrap.appendChild(t);
  }

  function renderAccounts(rows) {
    const wrap = $('#accountsWrap');
    if (!rows.length) { wrap.innerHTML = '<div class="empty">暂无账号数据</div>'; return; }
    const t = el('table');
    t.innerHTML = '<thead><tr><th>用户名</th><th>用户 ID</th><th>注册时间</th><th>最近登录</th><th>登录次数</th><th>状态</th><th>封禁原因</th><th>操作</th></tr></thead>';
    const tb = el('tbody');
    for (const r of rows) {
      const tr = el('tr');
      tr.appendChild(el('td', null, r.username || '-'));
      tr.appendChild(el('td', null, el('span', { class: 'mono' }, r.id || '-')));
      tr.appendChild(el('td', null, fmtMaybeTs(r.created_at)));
      tr.appendChild(el('td', null, fmtMaybeTs(r.last_login_at)));
      tr.appendChild(el('td', null, String(r.login_count || 0)));
      tr.appendChild(el('td', null,
        el('span', { class: 'pill ' + (r.revoked ? 'danger' : 'ok') }, r.revoked ? '已封禁' : '正常')
      ));
      const reasonCell = el('div', { class: 'cell-stack' });
      reasonCell.appendChild(el('div', { class: 'reason-text' }, r.revoked_reason || '-'));
      if (r.revoked_at) reasonCell.appendChild(el('span', { class: 'cell-sub' }, '封禁于 ' + fmtTs(r.revoked_at)));
      tr.appendChild(el('td', null, reasonCell));
      const actions = el('div', { class: 'actions-row' });
      if (r.revoked) {
        const btn = el('button', { class: 'btn' }, '解封');
        btn.onclick = () => doUnbanUser(r);
        actions.appendChild(btn);
      } else {
        const btn = el('button', { class: 'btn danger' }, '封禁');
        btn.onclick = () => doBanUser(r);
        actions.appendChild(btn);
      }
      tr.appendChild(el('td', null, actions));
      tb.appendChild(tr);
    }
    t.appendChild(tb);
    wrap.innerHTML = '';
    wrap.appendChild(t);
  }

  function renderEvents(rows) {
    const wrap = $('#eventsWrap');
    if (!rows.length) { wrap.innerHTML = '<div class="empty">暂无事件</div>'; return; }
    const t = el('table');
    t.innerHTML = '<thead><tr><th>时间</th><th>类型</th><th>用户/IP</th><th>详情</th></tr></thead>';
    const tb = el('tbody');
    for (const e of rows) {
      const tr = el('tr');
      tr.appendChild(el('td', null, fmtTs(e.ts || Date.now())));
      const pillClass = e.type && /risk|ban|fail|block/.test(e.type) ? 'pill danger' : 'pill';
      tr.appendChild(el('td', null, el('span', { class: pillClass }, e.type || '?')));
      const who = el('div', { class: 'cell-stack' });
      who.appendChild(el('span', null, e.username || e.actor_username || e.user_id || e.ip || '-'));
      if (e.user_id || e.by) who.appendChild(el('span', { class: 'mono cell-sub' }, e.user_id || e.by));
      tr.appendChild(el('td', null, who));
      tr.appendChild(el('td', null, el('span', { class: 'mono', style: 'font-size:11px;color:var(--text-dim)' },
        JSON.stringify({ reasons: e.reasons, score: e.score, ip: e.ip }, (k,v) => v == null ? undefined : v))));
      tb.appendChild(tr);
    }
    t.appendChild(tb);
    wrap.innerHTML = ''; wrap.appendChild(t);
  }

  async function doBlock(ip, reason) {
    const r = await fetch('/api/admin/security/block-ip', {
      method: 'POST', credentials: 'same-origin',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ ip, reason, ttl_seconds: 86400 }),
    });
    if (r.ok) loadSecurity();
  }

  $('#blockBtn').onclick = () => {
    const ip = $('#blockIp').value.trim();
    const reason = $('#blockReason').value.trim();
    if (!ip) return;
    doBlock(ip, reason || 'manual');
    $('#blockIp').value = ''; $('#blockReason').value = '';
  };

  async function doBanUser(account) {
    const input = prompt('请输入封禁原因（会显示在后台）', account.revoked_reason || '手动封禁');
    if (input === null) return;
    try {
      const r = await fetch('/api/admin/security/ban-user', {
        method: 'POST', credentials: 'same-origin',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ user_id: account.id, reason: input.trim() }),
      });
      const j = await r.json();
      if (!r.ok || !j.ok) throw new Error(j.error || ('HTTP ' + r.status));
      showToast('已封禁 ' + (account.username || account.id), 'ok');
      loadSecurity();
    } catch (e) {
      showToast('封禁失败: ' + e.message, 'err');
    }
  }

  async function doUnbanUser(account) {
    if (!confirm('确认解封账号「' + (account.username || account.id) + '」?')) return;
    try {
      const r = await fetch('/api/admin/security/unban-user', {
        method: 'POST', credentials: 'same-origin',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ user_id: account.id }),
      });
      const j = await r.json();
      if (!r.ok || !j.ok) throw new Error(j.error || ('HTTP ' + r.status));
      showToast('已解封 ' + (account.username || account.id), 'ok');
      loadSecurity();
    } catch (e) {
      showToast('解封失败: ' + e.message, 'err');
    }
  }
  // ---- Tab 2: 邀请码 ----
  function formatCode(p) {
    // Insert dashes every 5 chars for readability: ABCDE-FGHIJ-KLMNO-...
    return String(p).replace(/(.{5})/g, '$1-').replace(/-$/, '');
  }

  $('#invResetBtn').onclick = () => {
    $('#invCount').value = 1;
    $('#invLabel').value = '';
    $('#invNote').value = '';
    $('#invYears').value = 10;
    $('#invResult').innerHTML = '';
  };

  $('#invGenerateBtn').onclick = async () => {
    const count = Math.max(1, Math.min(200, parseInt($('#invCount').value || '1', 10)));
    const label = $('#invLabel').value.trim();
    const note = $('#invNote').value.trim();
    const years = parseInt($('#invYears').value || '10', 10);
    const btn = $('#invGenerateBtn');
    btn.disabled = true;
    btn.textContent = '生成中...';
    try {
      const r = await fetch('/api/admin/invites/batch', {
        method: 'POST', credentials: 'same-origin',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ count, label, note, years }),
      });
      const j = await r.json();
      if (!r.ok || !j.ok) throw new Error(j.error || ('HTTP ' + r.status));
      renderInvitesResult(j.codes);
      showToast('已生成 ' + count + ' 个邀请码', 'ok');
    } catch (e) {
      showToast('生成失败: ' + e.message, 'err');
    } finally {
      btn.disabled = false;
      btn.textContent = '生成';
    }
  };

  function renderInvitesResult(codes) {
    const wrap = $('#invResult');
    wrap.innerHTML = '';
    if (!codes || !codes.length) return;
    const wrap2 = el('div', { class: 'code-result' });
    const head = el('div', { class: 'code-result-header' });
    head.appendChild(el('h3', null, '已生成 ' + codes.length + ' 个邀请码'));
    head.appendChild(el('span', { class: 'warn' }, '⚠ 明文只显示这一次，请立即复制'));
    const actions = el('div', { class: 'code-result-actions' });
    const btnAll = el('button', { class: 'btn' }, '复制纯卡密');
    btnAll.onclick = () => copyAllCodes(codes);
    const btnJson = el('button', { class: 'btn' }, '下载 JSON');
    btnJson.onclick = () => downloadJson(codes);
    actions.appendChild(btnAll);
    actions.appendChild(btnJson);
    head.appendChild(actions);
    wrap2.appendChild(head);

    const list = el('div', { class: 'code-list' });
    codes.forEach((c, i) => {
      const row = el('div', { class: 'code-row' });
      row.appendChild(el('span', { class: 'code-num' }, String(i + 1) + '.'));
      const code = el('span', { class: 'code-text' }, formatCode(c.plaintext));
      row.appendChild(code);
      const cp = el('button', { class: 'code-copy' }, '复制');
      cp.onclick = () => {
        navigator.clipboard.writeText(c.plaintext).then(() => {
          cp.textContent = '已复制';
          setTimeout(() => cp.textContent = '复制', 1200);
        });
      };
      row.appendChild(cp);
      list.appendChild(row);
    });
    wrap2.appendChild(list);
    wrap.appendChild(wrap2);
  }

  function copyAllCodes(codes) {
    const text = codes.map(c => c.plaintext).join('\n');
    navigator.clipboard.writeText(text).then(() => showToast('已复制纯卡密到剪贴板', 'ok'));
  }

  function downloadJson(codes) {
    const blob = new Blob([JSON.stringify(codes, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'invites-' + Date.now() + '.json';
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  }
  // ---- Tab 3: 公告 ----
  $('#annResetBtn').onclick = () => {
    $('#annKind').value = 'info';
    $('#annTitle').value = '';
    $('#annBody').value = '';
    $('#annExpires').value = '';
    $('#annPinned').checked = false;
  };

  $('#annPublishBtn').onclick = async () => {
    const kind = $('#annKind').value;
    const title = $('#annTitle').value.trim();
    const body = $('#annBody').value.trim();
    const expiresRaw = $('#annExpires').value;
    const pinned = $('#annPinned').checked;
    if (!title || !body) { showToast('标题和正文不能为空', 'err'); return; }
    const expires_at = expiresRaw ? new Date(expiresRaw).toISOString() : null;
    const btn = $('#annPublishBtn');
    btn.disabled = true; btn.textContent = '发布中...';
    try {
      const r = await fetch('/api/admin/announcements', {
        method: 'POST', credentials: 'same-origin',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ kind, title, body, expires_at, pinned }),
      });
      const j = await r.json();
      if (!r.ok || !j.ok) throw new Error(j.error || ('HTTP ' + r.status));
      showToast('公告已发布', 'ok');
      $('#annResetBtn').click();
      loadAnnouncementsList();
    } catch (e) {
      showToast('发布失败: ' + e.message, 'err');
    } finally {
      btn.disabled = false; btn.textContent = '发布';
    }
  };

  async function loadAnnouncementsList() {
    const wrap = $('#annList');
    wrap.innerHTML = '<div class="empty">载入中...</div>';
    try {
      const r = await fetch('/api/admin/announcements', { credentials: 'same-origin' });
      const j = await r.json();
      if (!r.ok || !j.ok) throw new Error(j.error || ('HTTP ' + r.status));
      renderAnnouncementsAdmin(j.announcements || []);
    } catch (e) {
      wrap.innerHTML = '<div class="empty">加载失败: ' + e.message + '</div>';
    }
  }

  const KIND_LABEL = { info: '通知', warn: '警告', downtime: '停服', promo: '活动' };

  function renderAnnouncementsAdmin(list) {
    const wrap = $('#annList');
    wrap.innerHTML = '';
    if (!list.length) { wrap.innerHTML = '<div class="empty">还没有公告</div>'; return; }
    list.sort((a, b) => {
      if (!!a.pinned !== !!b.pinned) return a.pinned ? -1 : 1;
      return new Date(b.created_at).getTime() - new Date(a.created_at).getTime();
    });
    for (const a of list) {
      const expired = a.expires_at && new Date(a.expires_at).getTime() < Date.now();
      const card = el('div', { class: 'ann-admin-card' + (a.active === false || expired ? ' inactive' : '') });
      const head = el('div', { class: 'ann-head' });
      head.appendChild(el('h3', null,
        (a.pinned ? '📌 ' : '') + (KIND_LABEL[a.kind] || '通知') + ' · ' + a.title));
      const actions = el('div', { class: 'ann-actions' });
      const toggleBtn = el('button', { class: 'btn' }, a.active !== false ? '停用' : '启用');
      toggleBtn.onclick = () => updateAnnouncement(a.id, { active: !(a.active !== false) });
      actions.appendChild(toggleBtn);
      const pinBtn = el('button', { class: 'btn' }, a.pinned ? '取消置顶' : '置顶');
      pinBtn.onclick = () => updateAnnouncement(a.id, { pinned: !a.pinned });
      actions.appendChild(pinBtn);
      const delBtn = el('button', { class: 'btn danger' }, '删除');
      delBtn.onclick = () => {
        if (!confirm('确认删除公告「' + a.title + '」? 此操作不可撤销。')) return;
        deleteAnnouncement(a.id);
      };
      actions.appendChild(delBtn);
      head.appendChild(actions);
      card.appendChild(head);
      card.appendChild(el('div', { class: 'ann-body-text' }, a.body));
      const meta = el('div', { class: 'ann-meta-row' });
      meta.appendChild(el('span', null, '创建: ' + fmtTs(a.created_at)));
      if (a.expires_at) meta.appendChild(el('span', null, '过期: ' + fmtTs(a.expires_at) + (expired ? ' (已过期)' : '')));
      if (a.active === false) meta.appendChild(el('span', { style: 'color:var(--red)' }, '已停用'));
      meta.appendChild(el('span', null, 'by ' + (a.created_by || '-')));
      card.appendChild(meta);
      wrap.appendChild(card);
    }
  }

  async function updateAnnouncement(id, patch) {
    try {
      const r = await fetch('/api/admin/announcements/' + encodeURIComponent(id) + '/update', {
        method: 'POST', credentials: 'same-origin',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify(patch),
      });
      const j = await r.json();
      if (!r.ok || !j.ok) throw new Error(j.error || ('HTTP ' + r.status));
      showToast('已更新', 'ok');
      loadAnnouncementsList();
    } catch (e) {
      showToast('更新失败: ' + e.message, 'err');
    }
  }

  async function deleteAnnouncement(id) {
    try {
      const r = await fetch('/api/admin/announcements/' + encodeURIComponent(id) + '/delete', {
        method: 'POST', credentials: 'same-origin',
      });
      const j = await r.json();
      if (!r.ok || !j.ok) throw new Error(j.error || ('HTTP ' + r.status));
      showToast('已删除', 'ok');
      loadAnnouncementsList();
    } catch (e) {
      showToast('删除失败: ' + e.message, 'err');
    }
  }

  // ---- Init ----
  loadSecurity();
  setInterval(loadSecurity, 30000);
</script>
</body>
</html>
